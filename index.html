<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Base64</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 40px;
    }
    textarea {
      width: 90%;
      height: 150px;
    }
  </style>
</head>
<body>

<h2>Base64</h2>

<textarea id="out"></textarea>

<script>
function toBase64(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

const info = `
User-Agent: ${navigator.userAgent}
Platform: ${navigator.platform}
Language: ${navigator.language}
`;

document.getElementById("out").value = toBase64(info);
</script>

</body>
</html>
