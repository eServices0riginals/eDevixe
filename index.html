<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>eRX</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 40px;
    }
    textarea {
      width: 90%;
      height: 150px;
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }
    h2 {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<h2>eServices for eRX</h2>

<textarea id="out"></textarea>

<br>
<button onclick="copyText()">Скопировать</button>

<script>
function toBase64(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

const info = `
User-Agent: ${navigator.userAgent}
Platform: ${navigator.platform}
Language: ${navigator.language}
`;

const encoded = toBase64(info);
document.getElementById("out").value = encoded;

function copyText() {
  const out = document.getElementById("out");
  out.select();
  document.execCommand("copy");
  alert("Скопировано!");
}
</script>

</body>
</html>
